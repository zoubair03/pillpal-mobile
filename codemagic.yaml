workflows:
  android-debug:
    name: PillPal Android APK
    max_build_duration: 60
    instance_type: linux_x2    # free Linux instance — no cost
    environment:
      node: 20.17.0
      java: 17
      vars:
        BUNDLE_ID: "com.pillpal.mobile"
      groups:
        - supabase_env         # EXPO_PUBLIC_SUPABASE_URL + EXPO_PUBLIC_SUPABASE_ANON_KEY

    scripts:
      - name: Install dependencies
        working_directory: $CM_BUILD_DIR
        script: |
          npm install

      - name: Expo Prebuild — generate native Android project
        working_directory: $CM_BUILD_DIR
        script: |
          npx expo prebuild --platform android --clean

      - name: Build Debug APK
        working_directory: $CM_BUILD_DIR/android
        script: |
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
      - android/app/build/outputs/**/*.apk
