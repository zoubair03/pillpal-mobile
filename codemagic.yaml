workflows:
  ios-debug-build:
    name: PillPal iOS Unsigned
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20.x
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.pillpal.mobile"
      groups:
        - supabase_env

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Build Unsigned IPA
        script: |
          # The --no-codesign flag is the "magic" that bypasses the $99 check
          xcode-project build-ipa \
            --workspace "ios/pillpalmobile.xcworkspace" \
            --scheme "pillpalmobile" \
            --config Release \
            --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
